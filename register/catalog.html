<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Catalog — NOVAPA</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:ital,wght@0,600;0,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<script src="/register/config.js"></script>
<style>
  :root {
    --navy0:#08111F; --navy1:#0F1E36; --navy2:#162B52;
    --gold:#C8892A; --gold2:#E8B84B; --gold3:#F7D98F;
    --ink:rgba(255,255,255,0.88); --ink-dim:rgba(255,255,255,0.62);
    --line:rgba(255,255,255,0.14); --card:rgba(22,43,82,0.45);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; color:var(--ink);
    background:radial-gradient(1200px 700px at 70% -10%, #1b3563 0%, var(--navy1) 45%, var(--navy0) 100%);
    min-height:100vh; }
  .top { position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:14px;
    padding:14px 20px; background:rgba(8,17,31,0.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .brand { font-family:'Cinzel',serif; font-weight:700; letter-spacing:0.22em; font-size:15px; color:#fff; text-decoration:none; }
  .brand em { color:var(--gold2); font-style:normal; }
  .top-note { font-size:12px; color:var(--ink-dim); margin-left:auto; }
  .wrap { max-width:1080px; margin:0 auto; padding:30px 20px 80px; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(28px,5vw,40px); color:#fff; margin-bottom:6px; }
  .sub { color:var(--ink-dim); margin-bottom:20px; font-size:15px; }
  .bar { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:22px; align-items:center; }
  .tab { padding:9px 18px; border-radius:999px; border:1px solid var(--line); cursor:pointer;
    color:var(--ink-dim); font-weight:600; font-size:14px; user-select:none; background:none; font-family:inherit; }
  .tab.sel { background:var(--gold2); border-color:var(--gold2); color:#1a1206; }
  #q { flex:1; min-width:180px; padding:10px 16px; border-radius:999px; border:1px solid var(--line);
    background:rgba(8,17,31,0.6); color:#fff; font-size:14px; font-family:inherit; }
  #q::placeholder { color:rgba(255,255,255,0.4); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:14px; }
  .it { background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden;
    display:flex; flex-direction:column; transition:transform .15s, border-color .15s; }
  .it:hover { transform:translateY(-2px); border-color:rgba(232,184,75,0.5); }
  .it .img { height:120px; background:linear-gradient(135deg, var(--navy2), #1b3563); background-size:cover; background-position:center; }
  .it .bd { padding:14px 16px 16px; display:flex; flex-direction:column; gap:5px; flex:1; }
  .it .nm { font-weight:700; color:#fff; font-size:15px; line-height:1.3; }
  .it .meta { font-size:12.5px; color:var(--ink-dim); }
  .it .tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:2px; }
  .it .tag { font-size:10px; text-transform:uppercase; letter-spacing:0.06em; padding:3px 8px;
    border-radius:999px; background:rgba(232,184,75,0.12); color:var(--gold3); }
  .it .ft { margin-top:auto; padding-top:10px; display:flex; justify-content:space-between; align-items:center; }
  .it .pr { font-weight:700; color:var(--gold2); font-size:16px; }
  .it .sp { font-size:11.5px; color:var(--ink-dim); }
  .count { font-size:13px; color:var(--ink-dim); margin-bottom:14px; }
  .disc { background:rgba(232,184,75,0.08); border:1px dashed rgba(232,184,75,0.45); border-radius:12px;
    padding:12px 16px; font-size:13.5px; color:var(--gold3); margin-bottom:20px; line-height:1.5; }
</style>
<meta name="theme-color" content="#08111F">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<style>html{background:#08111F}</style>
</head>
<body>
<div class="top">
  <a class="brand" href="/">NOVA<em>PA</em></a>
  <div class="top-note">Program Catalog</div>
</div>
<div class="wrap">
  <h1>Everything NOVAPA offers</h1>
  <p class="sub">Discounts apply automatically at checkout.</p>
  <div class="disc" id="discBar">Loading discounts…</div>
  <div class="bar">
    <button class="tab sel" data-f="all">All</button>
    <button class="tab" data-f="class">Classes</button>
    <button class="tab" data-f="camp">Camps &amp; Shows</button>
    <input id="q" placeholder="Search programs…">
  </div>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>
</div>
<script>
(function(){
  var C = window.NOVAREG;
  var all = [], filter = 'all', q = '';
  function esc(s){ var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
  function rpc(fn){
    return fetch(C.SUPABASE_URL + '/rest/v1/rpc/' + fn, {
      method:'POST', headers:{ apikey:C.SUPABASE_ANON_KEY, 'Content-Type':'application/json' }, body:'{}'
    }).then(function(r){ return r.json(); });
  }
  function render(){
    var rows = all.filter(function(r){
      if (filter !== 'all' && r.category !== filter) return false;
      if (q && (r.name + ' ' + (r.widget_tags||[]).join(' ')).toLowerCase().indexOf(q) === -1) return false;
      return true;
    });
    document.getElementById('count').textContent = rows.length + ' of ' + all.length + ' programs';
    document.getElementById('grid').innerHTML = rows.map(function(r){
      var cta, href, note = '';
      if (r.bookable) {
        href = '/register/?activity=' + r.id;
        if (r.bb_gated && !r.gate_open) {
          cta = 'Returning families: register \u2192';
          note = 'Opens to everyone Aug 1';
        } else {
          cta = r.category === 'class' ? 'Enroll now \u2192' : 'Register \u2192';
        }
      } else {
        href = 'https://www.hisawyer.com' + (r.pdp_url || '');
        cta = 'View on Sawyer \u2192';
      }
      return '<a class="it" style="text-decoration:none" href="' + esc(href) + '"' +
        (r.bookable ? '' : ' target="_blank" rel="noopener"') + '>' +
        '<div class="img"' + (r.image_url ? ' style="background-image:url(' + esc(r.image_url) + ')"' : '') + '></div>' +
        '<div class="bd">' +
          '<div class="nm">' + esc(r.name) + '</div>' +
          '<div class="meta">' + esc(r.age_range || '') + (r.schedule_name ? ' · ' + esc(r.schedule_name) : '') + '</div>' +
          (r.bookable && r.remaining != null && r.remaining < 20 ? '<div class="meta" style="color:var(--gold3);font-weight:700">' + (r.remaining <= 0 ? 'Full' : r.remaining + ' more spots available') + '</div>' : '') +
          '<div class="tags">' + (r.widget_tags||[]).slice(0,3).map(function(t){ return '<span class="tag">' + esc(t) + '</span>'; }).join('') + '</div>' +
          '<div class="ft"><span class="pr">' + esc((r.pricing||[])[0] || '') + '</span>' +
          '<span class="sp" style="color:var(--gold2);font-weight:700">' + cta + '</span></div>' +
          (note ? '<div class="meta" style="color:var(--gold3)">' + note + '</div>' : '') +
        '</div></a>';
    }).join('');
  }
  rpc('catalog_list').then(function(rows){ all = rows || []; render(); });
  rpc('discounts_list').then(function(ds){
    document.getElementById('discBar').innerHTML = '<b>Current offers:</b> ' + (ds||[]).map(function(d){
      return esc(d.name);
    }).join(' · ');
  });
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click', function(){
      document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('sel'); });
      t.classList.add('sel'); filter = t.dataset.f; render();
    });
  });
  document.getElementById('q').addEventListener('input', function(e){ q = e.target.value.toLowerCase(); render(); });
})();
</script>
</body>
</html>
